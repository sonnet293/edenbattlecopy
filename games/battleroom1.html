<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/battleroom1.css">
  <title>철거 예정 구역의 빈 골목</title>
</head>
<body>
  
  <div class="battle-wrap">
    <!--적군 섹션-->
    <div class="pokemon-pannel opponent">
      <div class="portrait-placeholder" id="enemy-portrait-placeholder"></div>
      <img id="enemy-portrait" class="portrait-img">
      <span class="name" id="enemy-name">적군</span>
      <span class="hp-text" id="enemy-hp">-</span>
      <div class="hp-bar-bg">
        <div class="hp-bar" id="enemy-hp-bar"></div>
      </div>
      <div class="stats" id="enemy-stats"></div>
      <div class="bench-list" id="enemy-bench"></div>
    </div>
  </div>

  <!--아군 섹션-->
  <div class="pokemon-panel mine">
      <div class="portrait-wrap">

        <div class="portrait-placeholder" id="mine-portrait-placeholder"></div>

        <img id="mine-portrait" class="portrait-img" alt="" />
      </div>
      <div class="panel-header">
        <span class="name" id="mine-name">아군</span>
        <span class="hp-text" id="mine-hp">-</span>
      </div>
      <div class="hp-bar-bg">
        <div class="hp-bar" id="mine-hp-bar"></div>
      </div>
      <div class="stats" id="mine-stats"></div>

      <div class="switch-section">
        <div class="bench-list" id="mine-bench"></div>
      </div>
    </div>

  <div class="dice-row" id="diceRow">
    <div class="dice-name" id="dice-mine-name">아군</div>
    <div class="dice-number" id="dice-mine">-</div>
    <div class="dice-name" id="dice-enemy-name">적군</div>
    <div class="dice-number" id="dice-enemy">-</div>
  </div>

  <div class="turn-indicator" id="turn-indicator"></div>

  <div class="result" id="result"></div>

  <div class="move-grid">
    <button class="move-btn" id="moveBtn0" style="display: none;"></button>
    <button class="move-btn" id="moveBtn1" style="display: none;"></button>
    <button class="move-btn" id="moveBtn2" style="display: none;"></button>
    <button class="move-btn" id="moveBtn3" style="display: none;"></button>
  </div>

  <div id="battle-log"></div>

  <div class="chat-section" id="spectator-chat-section" style="display:none;">
      <div class="chat-title">관전자 채팅</div>
  
      <div class="chat-messages" id="spectator-chat-messages"></div>
      <div class="chat-input-row">
        
        <input type="text" id="spectator-chat-input" placeholder="메시지를 입력하세요" />
       
        <button id="spectator-chat-send-btn">전송</button>
      </div>
    </div>







  </div>

  <script>
    const ROOM_ID = "battleroom1";
  </script>
  <script type="module" src="../js/battle.js"></script>
  <script type="module" src="../js/chat.js"></script>
</body>
</html>
